name: Keep Alive / Uptime Check

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Chamada de Health Check em Loop (a cada 50s)
        run: |
          API_URL="https://api-agenda-smile.onrender.com"


          for i in {1..6}
          do
            echo "Ping $i: Verificando ${API_URL}..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$API_URL")
            
            if [ "$RESPONSE" -eq 200 ]; then
              echo "HTTP 200"
            else
              echo "HTTP $RESPONSE"
            fi
            
            if [ $i -lt 6 ]; then
              echo "Aguardando 50 segundos..."
              sleep 50
            fi
          done
